name: Update and Deploy TTV Dashboard

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      # ✅ 1. Get latest code
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # ✅ 4. Run YOUR pipeline
      - name: Run pipeline
        run: |
          python main.py

      # ✅ 5. Commit updated outputs
      - name: Commit outputs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add outputs.csv
          git commit -m "Update outputs" || echo "No changes"
          git push
