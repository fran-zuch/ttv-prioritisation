<!DOCTYPE html>
<html>
<head>
<title>TTV Target Selection</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.min.js"></script>

<style>
body { font-family: Arial; margin: 20px; }
.controls { background:#f4f4f4;padding:10px;border-radius:8px;}
table { width:100%; border-collapse:collapse; }
th,td{ border:1px solid #ddd;padding:6px;text-align:center;}
th{background:#eee;}
</style>
</head>

<body>

<h1>🔭 PIRATE Scheduling</h1>
<p><b>Instrument-aware prioritisation for exoplanet transits.</b></p>

<div class="controls">
Min Score:
<input type="range" id="scoreFilter" min="0" max="1" step="0.01" value="0.5">
<span id="scoreValue">0.5</span>

| PIRATE Ready:
<input type="checkbox" id="pirateToggle">

| Tonight:
<input type="checkbox" id="tonightToggle">
</div>

<button onclick="downloadScheduler()">📡 Export Scheduler CSV</button>
<button onclick="generateEmail()">✉️ Generate OU Email</button>

<h2>⚙️ Scoring Model</h2>
<p>Weighted prioritisation combining ephemeris, TTV, instrument, observability, science, and synergy.</p>

<div id="plot1"></div>

<table id="table"></table>

<script>

let globalData = [];
let filteredData = [];

function safe(x,d=2){ return (!x||isNaN(x)) ? "-" : Number(x).toFixed(d); }

// ✅ LOAD CSV (dated)
const today = new Date().toISOString().slice(0,10).replace(/-/g,"");

Papa.parse(`outputs_${today}.csv`, {
    download:true,
    header:true,
    dynamicTyping:true,
    complete: function(r){
        globalData = r.data;
        updateDashboard();
    }
});

function updateDashboard(){

    let minScore = parseFloat(document.getElementById("scoreFilter").value);

    filteredData = globalData.filter(r=>r.final_score>=minScore);

    // ✅ PIRATE filter
    if(document.getElementById("pirateToggle").checked){
        filteredData = filteredData.filter(r =>
            r.obs_max_alt >= 40 &&
            r.obs_frac > 0.5 &&
            r.duration_hours <= 4
        );
    }

    renderTable(filteredData);
}

function renderTable(data){
    let html = "<tr><th>Target</th><th>Score</th><th>Time</th></tr>";
    data.slice(0,20).forEach(r=>{
        html+=`<tr>
        <td>${r.name}</td>
        <td>${safe(r.final_score)}</td>
        <td>${r.Tmid_utc}</td>
        </tr>`;
    });
    document.getElementById("table").innerHTML = html;
}

// ✅ SCHEDULER EXPORT
function downloadScheduler(){
    let csv="Name,RA,Dec,Start,End\n";

    filteredData.slice(0,5).forEach(r=>{
        let mid=new Date(r.Tmid_utc);
        let dur=r.duration_hours*3600*1000;

        let s=new Date(mid.getTime()-dur/2).toISOString();
        let e=new Date(mid.getTime()+dur/2).toISOString();

        csv+=`${r.name},${r.ra},${r.dec},${s},${e}\n`;
    });

    let blob=new Blob([csv]);
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="pirate_scheduler.csv";
    a.click();
}

// ✅ OU EMAIL GENERATOR
function generateEmail(){

    const top = filteredData.slice(0,3);

    let text="Subject: S841/SXS841 observing request\n\n";

    text+="Your name: [ENTER]\n";
    text+="Your OUCU: [ENTER]\n";

    top.forEach((t,i)=>{

        let mid=new Date(t.Tmid_utc);
        let dur=t.duration_hours*3600*1000;

        let s=new Date(mid.getTime()-dur/2);
        let e=new Date(mid.getTime()+dur/2);

        text+=`\n--- Target ${i+1} ---\n`;
        text+=`Name: ${t.name}\n`;
        text+=`RA: ${t.ra} Dec: ${t.dec}\n`;
        text+=`Start: ${s.toISOString()}\n`;
