<!DOCTYPE html>
<html>
<head>
<title>TTV Target Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<style>
body { font-family: Arial; margin:20px;}

.controls {
    background:#f4f4f4;
    padding:10px;
    border-radius:8px;
}

table {
    width:100%;
    border-collapse:collapse;
}

th,td {
    border:1px solid #ddd;
    padding:6px;
    text-align:center;
}

th { background:#eee; }

.panel {
    border:2px solid #444;
    padding:10px;
    margin-top:20px;
}

/* score colouring */
.high { color:green; font-weight:bold; }
.medium { color:#d48800; }
.low { color:#888; }
</style>
</head>

<body>

<h1>🔭 Prioritisation and Scoring Pipeline</h1>
<h2>Instrument aware: PIRATE Telescope</h2>

<div class="controls">
Min Score <input type="range" id="scoreFilter" min="0" max="5" step="0.01" value="3.5">
<input type="checkbox" id="pirateToggle"> PIRATE only
</div>

<button onclick="downloadScheduler()">📡 Scheduler CSV</button>

<!-- ✅ TOP TARGETS -->
<div class="panel">
<h2>⭐ Top Targets (Next Observations)</h2>
<ul id="topTargets"></ul>
</div>

<div id="plot_breakdown"></div>

<table id="table"></table>

<div id="detailPanel" class="panel">
<h2>📊 Target Detail</h2>
<p>Select a target to view details</p>
</div>

<script>

let globalData=[];
let filteredData=[];

function safe(x,d=2){
    return (!x || isNaN(x)) ? "-" : Number(x).toFixed(d);
}

/* ✅ load correct CSV */
const today=new Date().toISOString().slice(0,10).replace(/-/g,"");

Papa.parse(`output/outputs_${today}.csv`,{
    download:true,
    header:true,
    dynamicTyping:true,
    complete:r=>{
        globalData=r.data;
        updateDashboard();
    }
});

/* ✅ deduplicate */
function getBestPerTarget(data){
    const best={};
    data.forEach(r=>{
        if(!r.name) return;

        if(!best[r.name] || r.final_score > best[r.name].final_score){
            best[r.name]=r;
        }
    });
    return Object.values(best);
}

/* ✅ observability classification */
function getObsClass(r){
    if(r.obs_frac > 0.7 && r.obs_max_alt > 60) return "🌟 Excellent";
    if(r.obs_frac > 0.4 && r.obs_max_alt > 30) return "✅ Good";
    if(r.obs_frac > 0.1) return "⚠️ Partial";
    return "❌ Poor";
}

/* ✅ score colouring */
function getScoreClass(score){
    if(score >= 4) return "high";
    if(score >= 3.5) return "medium";
    return "low";
}

/* ✅ main update */
function updateDashboard(){

let minScore=parseFloat(scoreFilter.value);

let base = getBestPerTarget(globalData);

filteredData = base.filter(r=>r.final_score >= minScore);

if(pirateToggle.checked){
    filteredData = filteredData.filter(r =>
        r.obs_max_alt >= 40 &&
        r.obs_frac > 0.5 &&
        r.duration_hours <= 4
    );
}

renderTopTargets(filteredData);
renderTable(filteredData);
renderPlots(filteredData);
}

/* ✅ top targets */
function renderTopTargets(data){

let top = [...data]
    .sort((a,b)=>b.final_score - a.final_score)
    .slice(0,5);

let html="";

top.forEach(t=>{
    let mid=new Date(t.Tmid_utc);
    let dur=t.duration_hours*3600*1000;

    let start=new Date(mid - dur/2);
    let end=new Date(mid + dur/2);

    html+=`
<li>
<b>${t.name}</b> (Score: ${safe(t.final_score)})
<br>🕒 ${start.toLocaleString()} → ${end.toLocaleString()}
<br>⛰ Alt: ${safe(t.obs_max_alt)}° | Obs: ${safe(t.obs_frac)}
<br>📊 ${getObsClass(t)}
</li><br>`;
});

document.getElementById("topTargets").innerHTML=html;
}

/* ✅ upgraded table */
function renderTable(data){

let html=`
<tr>
<th>Target</th>
<th>Score</th>
<th>Obs %</th>
<th>Max Alt</th>
<th>σ (min)</th>
<th>Duration (h)</th>
<th>Next Transit</th>
<th>Obs Class</th>
<th>PIRATE</th>
</tr>`;

data.sort((a,b)=>b.final_score - a.final_score)
    .slice(0,30)
    .forEach(r=>{

let pirate = (r.obs_max_alt >= 40 && r.obs_frac > 0.5) ? "✅" : "❌";

let scoreClass = getScoreClass(r.final_score);

html+=`
<tr onclick="showDetails('${r.name}')">
<td>${r.name}</td>
<td class="${scoreClass}">${safe(r.final_score)}</td>
<td>${safe(r.obs_frac)}</td>
<td>${safe(r.obs_max_alt)}</td>
<td>${safe(r.pred_sigma_min)}</td>
<td>${safe(r.duration_hours)}</td>
<td>${r.Tmid_utc ? new Date(r.Tmid_utc).toLocaleString() : "-"}</td>
<td>${getObsClass(r)}</td>
<td>${pirate}</td>
</tr>`;
});

table.innerHTML=html;
}

/* ✅ detail panel */
function showDetails(name){

let r = filteredData.find(d=>d.name===name);

detailPanel.innerHTML=`
<h3>${r.name}</h3>
<p><b>Score:</b> ${safe(r.final_score)}</p>
<p><b>Obs:</b> ${safe(r.obs_frac)} | Max Alt ${safe(r.obs_max_alt)}</p>
<p><b>σ:</b> ${safe(r.pred_sigma_min)} min</p>
<p><b>Duration:</b> ${safe(r.duration_hours)} hr</p>
<p><b>${getObsClass(r)}</p>
`;
}

/* ✅ simple plot */
function renderPlots(data){
Plotly.newPlot("plot_breakdown", [{
    x:data.slice(0,10).map(d=>d.name),
    y:data.slice(0,10).map(d=>d.final_score),
    type:'bar'
}],{
    title:"Top Scores"
});
}

/* ✅ scheduler */
function downloadScheduler(){
let csv="Name,RA,Dec,Start,End\n";

filteredData.slice(0,5).forEach(r=>{
    let mid=new Date(r.Tmid_utc);
    let dur=r.duration_hours*3600*1000;

    let s=new Date(mid-dur/2).toISOString();
    let e=new Date(mid+dur/2).toISOString();

    csv+=`${r.name},${r.ra},${r.dec},${s},${e}\n`;
});

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="scheduler.csv";
a.click();
}

</script>

</body>
</html>
